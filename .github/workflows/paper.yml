name: paper

# Compile the PIC formalism paper and PUBLISH it to GitHub Pages on every master push, so the current
# PDF is always available at a stable, browsable URL (https://jascal.github.io/pic/pic_calculus.pdf) —
# no 90-day artifact expiry, no navigating to a run. PR builds still produce a downloadable artifact and
# verify the LaTeX compiles, but do not deploy.

on:
  push:
    branches: [master]
    paths:
      - 'paper/**'
      - '.github/workflows/paper.yml'
  pull_request:
    paths:
      - 'paper/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# never cancel an in-flight Pages deploy; let each finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile pic_calculus.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: pic_calculus.tex
          working_directory: paper

      - name: Assemble the Pages site (PDF + landing page)
        run: |
          mkdir -p site
          cp paper/pic_calculus.pdf site/pic_calculus.pdf
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Projective Incidence Calculus</title>
            <style>
              body { font: 16px/1.5 system-ui, sans-serif; max-width: 48rem; margin: 3rem auto; padding: 0 1rem; }
              a { color: #0b5; } .pdf { width: 100%; height: 80vh; border: 1px solid #ccc; margin-top: 1rem; }
              code { background: #f4f4f4; padding: 0 .3em; border-radius: 3px; }
            </style>
          </head>
          <body>
            <h1>Projective Incidence Calculus</h1>
            <p>The algebraic formalism for the analyze&nbsp;&rarr;&nbsp;verify&nbsp;&rarr;&nbsp;learn program
               (<a href="https://github.com/jascal/fieldrun">fieldrun</a>,
               <a href="https://github.com/jascal/i-orca">i-orca</a>,
               <a href="https://github.com/jascal/pil">pil</a>).
               &nbsp;<a href="https://github.com/jascal/pic">source repo</a> ·
               <a href="pic_calculus.pdf">download PDF</a> · Apache-2.0.</p>
            <p>This page always serves the latest <code>master</code> build of the paper.</p>
            <embed class="pdf" src="pic_calculus.pdf" type="application/pdf">
          </body>
          </html>
          HTML

      - name: Upload PDF artifact (PR + master)
        uses: actions/upload-artifact@v4
        with:
          name: pic_calculus-pdf
          path: paper/pic_calculus.pdf
          if-no-files-found: error

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
